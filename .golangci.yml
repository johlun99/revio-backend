version: "2"

linters:
  default: none
  enable:
    - errcheck       # unchecked errors
    - govet          # suspicious constructs
    - staticcheck    # broad static analysis
    - unused         # unused code
    - gocritic       # opinionated but useful checks
    - nilerr         # return nil with non-nil error
    - exhaustive     # exhaustive enum switches

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/johlun99/revio

issues:
  max-same-issues: 5
  exclude-rules:
    - path: _test\.go
      linters: [errcheck]
