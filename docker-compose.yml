services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-revio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-revio_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-revio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-revio}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-revio_dev}?sslmode=disable
      - APP_ENV=development
      - APP_PORT=8080
      - JWT_SECRET=${JWT_SECRET:?required}
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
    volumes:
      - .:/app
      - go_mod_cache:/root/go/pkg/mod
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  go_mod_cache:
